<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tampu Super App</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #2c2c54);
  color: white;
}

/* HEADER */
header {
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  background: #111;
  box-shadow: 0 2px 5px rgba(0,0,0,0.5);
}

/* MENU */
.menu {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 15px;
}

.menu button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  background: #4CAF50;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.menu button:hover {
  background: #45a049;
  transform: scale(1.05);
}

/* FRAME */
.container {
  padding: 10px;
}

iframe {
  width: 100%;
  height: 75vh;
  border: none;
  border-radius: 10px;
  background: white;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 10px;
  font-size: 12px;
  color: #ccc;
}
</style>

</head>
<body>

<header>
  🚀 Tampu Super App
</header>

<div class="menu">
  <button onclick="loadPage('https://rsltttampu.oneapp.dev/')">App 1</button>
  <button onclick="loadPage('https://tampu2312.github.io/Togeltampuu/')">App 2</button>
</div>

<div class="container">
  <iframe id="frame" src=""></iframe>
</div>

<footer>
  © 2026 Tampu App
</footer>

<script>
function loadPage(url) {
  document.getElementById("frame").src = url;
}
</script>

</body>
</html>
